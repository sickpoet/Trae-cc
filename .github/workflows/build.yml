name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: true

      - name: Get version and rename exe
        shell: bash
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          cp "src-tauri/target/release/Trae账号管理.exe" "src-tauri/target/release/Trae账号管理_${VERSION}.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/Trae账号管理_*.exe

      - name: Create Release and upload exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          TAG="v${VERSION}"
          EXE="src-tauri/target/release/Trae账号管理_${VERSION}.exe"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$EXE" --clobber
          else
            gh release create "$TAG" "$EXE" --title "$TAG" --notes "Trae账号管理 ${TAG}" --latest
          fi
